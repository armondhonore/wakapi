application:
  name: wakapi
  pods:
  - name: app
    image: ghcr.io/muety/wakapi:latest
    path: /
    servicePorts:
    - 3000
    vars:
      WAKAPI_DB_TYPE: sqlite3
      WAKAPI_DB_NAME: /data/wakapi.db
      WAKAPI_PASSWORD_SALT: nexlayer-wakapi-salt-2024
      WAKAPI_ALLOW_SIGNUP: "true"
      WAKAPI_DISABLE_FRONTPAGE: "false"
    volumes:
    - name: wakapi-data
      mountPath: /data
      size: 5Gi
